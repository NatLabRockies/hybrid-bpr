# Training Pipeline Configuration
# Used with TrainingPipeline for recommendation model training

# Model architecture — paper uses d=64
model:
  n_latent: 64     # Latent factors/dimensions
  sparse: false    # Sparse gradients for embeddings
  init_std: 0.01    # Weight initialization std dev

# Optimizer — paper uses Adagrad lr=0.05
optimizer:
  name: 'Adagrad'
  lr: 0.05
  weight_decay: 0.0

# Training — paper: early stopping on test AUC, no fixed epoch limit
training:
  loss_function: 'bpr_loss'
  n_iter: 2000
  batch_size: 20000
  eval_every: 10
  n_eval_users:              # null = all eval users
  top_k: 20
  neg_ratio: 1.0
  early_stopping_patience: 100
  log_level: 1

# Data — paper: rating>=4.0 positive, 20% warm/cold split, genome>=0.8
data:
  item_feature: 'metadata'
  split_mode: 'warm'
  cold_item_ratio: 0.2             # Paper: 20% items cold
  warm_train_ratio: 0.8            # Paper: 80/20 interaction split
  use_negs_for_training: false
  genome_relevance_threshold: 0.8  # Paper: filter tags below 0.8

# MLflow
mlflow:
  experiment_name: 'lightfm-exp4'
  tracking_uri: 'sqlite:///mlflow.db'

# Sweep: paper conditions + neg-sampling ablation
# item_feature: indicator=MF, metadata=LightFM(tags), both=LightFM(tags+ids)
# use_negs_for_training: false=paper setting, true=our contribution
sweep:
  data.item_feature: ['indicator', 'metadata']
  data.split_mode: ['warm', 'cold']
  data.use_negs_for_training: [false, true]
