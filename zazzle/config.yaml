# Training Pipeline Configuration
# Used with TrainingPipeline for Zazzle recommendation model training

# Model architecture
model:
  n_latent: 128    # Latent factors/dimensions
  sparse: false   # Sparse gradients for embeddings
  init_std: 0.01  # Weight initialization std dev

# Optimizer
optimizer:
  name: 'Adagrad'
  lr: 0.05
  weight_decay: 0.0

# Training
training:
  loss_function: 'bpr_loss'
  n_iter: 3000
  batch_size: 100
  eval_every: 10
  n_eval_users:                   # null = all eval users
  top_k: 20
  neg_ratio: 1.0
  early_stopping_patience: 100    # early stopping in eval units
  log_level: 1

# Data
data:
  item_feature: 'metadata'
  split_mode: 'warm'
  cold_item_ratio: 0.2
  warm_train_ratio: 0.8
  use_negs_for_training: false

# MLflow
mlflow:
  experiment_name: 'zazzle-runs4'
  tracking_uri: 'sqlite:///mlflow.db'

# Sweep
sweep:
  data.item_feature: ['indicator', 'metadata']
  data.split_mode: ['warm', 'cold']
  data.use_negs_for_training: [false, true]

